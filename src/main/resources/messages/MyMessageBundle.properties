# Localisable strings for the Antigravity CLI Opener plugin.
# Accessed via bynarig.MyMessageBundle; keys are referenced from plugin.xml and Kotlin code.

# Action label shown in the Tools menu, Search Everywhere, and Find Action.
action.bynarig.AntigravityCLIOpener.OpenAntigravityCli.text=Open Antigravity CLI
action.bynarig.AntigravityCLIOpener.OpenAntigravityCli.description=Open the terminal and run 'agr'

