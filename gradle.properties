# Project coordinates – `group` becomes the Maven group and the leading segment of
# the plugin id; `version` is the marketplace-visible version string.
group=bynarig
version=1.0.0

# Opt-out flag for bundling Kotlin stdlib — the IntelliJ Platform already ships one,
# bundling a second copy causes class-loader conflicts. See:
# https://jb.gg/intellij-platform-kotlin-stdlib
kotlin.stdlib.default.dependency=false

# Faster incremental builds: https://docs.gradle.org/current/userguide/configuration_cache.html
org.gradle.configuration-cache=true

# Reuse outputs across builds: https://docs.gradle.org/current/userguide/build_cache.html
org.gradle.caching=true
